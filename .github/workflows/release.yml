name: Release

on:
  push:
    tags:
      - 'v*'   # Si attiva quando si fa: git tag v0.1.0 && git push --tags

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest       # Mac Apple Silicon (M1/M2/M3)
            target: aarch64-apple-darwin
            artifact: 'dmg'
          - platform: macos-13           # Mac Intel
            target: x86_64-apple-darwin
            artifact: 'dmg'
          - platform: windows-latest     # Windows x64
            target: x86_64-pc-windows-msvc
            artifact: 'nsis'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'VolleyScoutPro ${{ github.ref_name }}'
          releaseBody: |
            ## VolleyScoutPro ${{ github.ref_name }}

            ### Download
            - **Mac (Apple Silicon M1/M2/M3)**: scarica il file `_aarch64.dmg`
            - **Mac (Intel)**: scarica il file `_x64.dmg`
            - **Windows**: scarica il file `.exe` o `.msi`

            ### Installazione Mac
            Apri il .dmg, trascina VolleyScoutPro nella cartella Applicazioni.
            Al primo avvio: tasto destro → Apri (necessario la prima volta perché l'app non è firmata con certificato Apple).

            ### Installazione Windows
            Esegui il file .exe come amministratore e segui le istruzioni.

            ### Dati
            I dati vengono salvati localmente sul tuo computer e non vengono trasmessi a nessun server.
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
